suite:
  id: "cross-judge-lamarckian"
  name: "Cross-judge validation: lamarckian"

agents:
  - name: "ad-agent"
    provider: "openrouter"
    model: "google/gemini-2.0-flash-lite-001"
    system_prompt: "Ты копирайтер Яндекс Директ. Пиши ОДИН вариант объявления, только текст, без заголовков, без вариантов, без ключевых слов, без ссылок. Максимум 3 предложения."
    temperature: 0.0
    maxTokens: 150

prompts:
  - id: "ad-prompt"
    name: "Финальный промпт стратегии lamarckian"
    template: "Создай привлекательную рекламу для {{product}}, подчеркивающую его ключевые преимущества и инновационные особенности"

test_cases:
  - promptId: "ad-prompt"
    agent: "ad-agent"
    variables:
      product: "iPhone 15 Pro"
    expected: |
      Шкала оценки (выведи числовой score 0.0–1.0):
      - 1.0 — в тексте есть минимум одна конкретная техническая характеристика iPhone 15 Pro (чип A17 Pro, титановый корпус, камера 48 МП, USB-C, ProMotion и т.п. — факт или цифра, не эпитет) И явный CTA-глагол в повелительном наклонении ("купите", "закажите", "оформите", "перейдите")
      - 0.7 — есть либо конкретная характеристика, либо CTA, но не оба сразу
      - 0.3 — текст по теме (упоминается смартфон/iPhone), но это только общие эпитеты ("мощный", "новый", "топовый") без единого факта и без CTA
      - 0.0 — пусто, не про iPhone, или галлюцинация
      Судья: "флагман", "новинка", "премиум" — это эпитеты, а не характеристики; считай только факты или цифры.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "yandex-eliza"
      judgeModel: "gpt-4.1"

  - promptId: "ad-prompt"
    agent: "ad-agent"
    variables:
      product: "MacBook Air M3"
    expected: |
      Шкала оценки (выведи числовой score 0.0–1.0):
      - 1.0 — в тексте НЕТ ни одного слова из списка штампов: "лучший", "отличный", "не упустите", "идеальный", "уникальный", "невероятный", "специальное предложение", "успейте", "только сегодня", "вы не пожалеете"
      - 0.7 — встречается ровно одно слово из списка штампов
      - 0.3 — встречается два или более слов из списка штампов, либо весь текст построен на эпитетах без сути
      - 0.0 — пусто или не про MacBook
      Судья: считай вхождения по подстроке без учёта регистра; если штамп встречается дважды — это два вхождения.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "yandex-eliza"
      judgeModel: "gpt-4.1"

  - promptId: "ad-prompt"
    agent: "ad-agent"
    variables:
      product: "Sony WH-1000XM5"
    expected: |
      Шкала оценки (выведи числовой score 0.0–1.0):
      - 1.0 — текст содержит от 1 до 3 предложений включительно (считай предложения по терминаторам . ! ? — многоточие "..." считай как одно)
      - 0.7 — ровно 4 предложения
      - 0.3 — 5 или больше предложений
      - 0.0 — пусто или не про наушники Sony
      Судья: списки и буллеты считай как отдельные предложения; заголовок-строка без точки тоже одно предложение.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "yandex-eliza"
      judgeModel: "gpt-4.1"

  - promptId: "ad-prompt"
    agent: "ad-agent"
    variables:
      product: "робот-пылесос Xiaomi S10"
    expected: |
      Шкала оценки (выведи числовой score 0.0–1.0):
      - 1.0 — названа конкретная количественная выгода для покупателя: цифра + единица измерения (например "экономит 5 часов в неделю", "мощность 4000 Па", "работает 180 минут без подзарядки", "скидка 20%", "уберёт 80 м² за один цикл")
      - 0.7 — выгода названа словами, но без числа ("экономит ваше время", "работает долго", "убирает быстро")
      - 0.3 — перечислены только функции/характеристики ("есть лидар", "влажная уборка"), но не сформулирована выгода для покупателя
      - 0.0 — пусто или не про пылесос
      Судья: цифра должна относиться к выгоде, а не быть просто частью названия модели "S10".
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "yandex-eliza"
      judgeModel: "gpt-4.1"

  - promptId: "ad-prompt"
    agent: "ad-agent"
    variables:
      product: "Яндекс Станция Макс"
    expected: |
      Шкала оценки (выведи числовой score 0.0–1.0):
      - 1.0 — живой разговорный русский: короткие фразы, прямое обращение к читателю ("вы", "тебе"), НЕТ канцеляризмов из списка: "является", "осуществляет", "производит", "данный", "вышеуказанный", "представляет собой", "в целях", "в рамках", "посредством"
      - 0.7 — стиль в целом живой, но проскочил ровно один канцеляризм из списка
      - 0.3 — текст написан в стиле инструкции/описания товара на сайте: безличные конструкции, два и более канцеляризма, нет обращения к читателю
      - 0.0 — пусто или не про Станцию
      Судья: не путай нейтральный стиль с канцеляритом — наказывай только за конкретные слова из списка и за безличные обороты.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "yandex-eliza"
      judgeModel: "gpt-4.1"

execution:
  enableParallelExecution: false
  testTimeout: 60s

regression:
  baselineMode: RECORD

optimizer:
  enabled: false