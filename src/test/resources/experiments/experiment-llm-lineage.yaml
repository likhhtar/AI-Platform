suite:
  id: "exp-llm-lineage"
  name: "Эксперимент: LLM + lineage (OPRO-стиль)"

agents:
  - name: "ad-agent"
    provider: "openrouter"
    model: "meta-llama/llama-3.2-3b-instruct:free"
    system_prompt: "Ты опытный копирайтер для рекламных объявлений Яндекс Директ."
    temperature: 0.0
    maxTokens: 300

prompts:
  - id: "ad-prompt"
    name: "Начальный промпт"
    template: "Напиши рекламу для: {{product}}"

test_cases:
  - promptId: "ad-prompt"
    agent: "ad-agent"
    variables:
      product: "iPhone 15 Pro"
    expected: |
      Объявление содержит конкретное УТП товара,
      призыв к действию (купить/заказать/узнать цену),
      не длиннее 3 предложений,
      подходит для рекламной платформы Яндекс Директ
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "openrouter"
      judgeModel: "mistralai/mistral-7b-instruct:free"

