execution:
  enableParallelExecution: false
  testTimeout: 60s

regression:
  baselineMode: RECORD

optimizer:
  enabled: true
  type: llm
  mode: APPLY
  iterations: 6
  plateau_score_epsilon: 0
  evolve_mutation_prompt: false
  use_lineage: true
  use_lamarckian: false
  mutation_prompt: |
    Rewrite this instruction to be more specific.
    Add explicit requirements for: output format,
    maximum length of 3 sentences, presence of CTA,
    and mention of key product benefit.
    Analyze the pattern of improvement from previous versions
    and extrapolate the next improvement.
    Do not repeat previous versions.
  llm:
    provider: "openrouter"
    model: "meta-llama/llama-3.2-3b-instruct:free"
    maxTokens: 500
