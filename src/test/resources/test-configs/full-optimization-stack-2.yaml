# Жёсткий бенч оптимизации: намеренно слабый шаблон + APPLY, чтобы оптимизатор реально переписывал промпт.
# Модели дешевле класса OpenAI GPT-4: Google Gemini 2.0 Flash через OpenRouter (агент, судья, оптимизатор).

suite:
  id: "full-optimization-stack-2"
  name: "Полный стек оптимизации 2 — APPLY, слабый промпт, строгие форматные тесты"

execution:
  enableParallelExecution: false
  testTimeout: 120s

regression:
  baselineMode: RECORD

agents:
  - name: "task-agent"
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
    systemPrompt: "Хорошо."
    temperature: 0.2
    maxTokens: 1024

prompts:
  - id: "main-prompt"
    name: "Основной промпт"
    template: |
      Ответь на вопрос: {{question}}

test_cases:
  - promptId: "main-prompt"
    agent: "task-agent"
    variables:
      question: "Назови три способа сократить использование пластика дома."
    expected: |
      Шкала оценки (выведи числовой score 0.0–1.0; выбери диапазон, который лучше всего подходит):
      - 1.0 — Ровно три строки, каждая начинается с «1.», «2.», «3.» (только эти префиксы), по одному действию в строке,
        разные идеи по сокращению пластика, без вступления/заключения, без маркеров вместо номеров.
      - 0.7 — Формат почти верный: три нумерованных пункта есть, но мелкие огрехи (лишние пробелы, короткое вступление/итог,
        или нумерация слегка сбита) И по содержанию всё ещё три правдоподобных действия по сокращению пластика.
      - 0.3 — По теме (конкретные способы меньше пластика дома), но формат неверный (простой текст, маркеры, не то число пунктов или нет нумерации).
      - 0.0 — Не по теме, пусто или нет полезного содержания про сокращение пластика.

      Судья: примени подходящий диапазон; если частично формат и частично содержание — предпочитай 0.7, а не 0.3.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "openrouter"
      judgeModel: "google/gemini-2.0-flash-001"

  - promptId: "main-prompt"
    agent: "task-agent"
    variables:
      question: "Объясни, зачем нужны регулярные физические упражнения."
    expected: |
      Шкала оценки (0.0–1.0):
      - 1.0 — Примерно 3–5 предложений, и все три фразы в кавычках дословно по одному разу каждая:
        "cardiovascular health", "mental health", "weight management". Число предложений правдоподобно в диапазоне.
      - 0.7 — Все три фразы дословно и по разу, но длина немного не та (напр. 2 или 6 предложений) ИЛИ одна фраза продублирована;
        ИЛИ 3–5 предложений со всеми тремя идеями, но в одной фразе мелкая опечатка, смысл термина всё ещё ясен.
      - 0.3 — По теме «зачем важны упражнения», но хотя бы одна обязательная фраза отсутствует, неверна или не дословна;
        ИЛИ нужные фразы есть, но они утонули в длинном тексте с неверной длиной и структурой.
      - 0.0 — Не про пользу упражнений, пусто или бессвязно.

      Судья: выбери лучший диапазон; 0.3 — за сильное содержание при провале формата/фраз; 0.7 — за почти попадание.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "openrouter"
      judgeModel: "google/gemini-2.0-flash-001"

  - promptId: "main-prompt"
    agent: "task-agent"
    variables:
      question: 'Кратко перескажи сюжет «Ромео и Джульетты» для школьника.'
    expected: |
      Шкала оценки (0.0–1.0):
      - 1.0 — Не больше двух предложений (обычная пунктуация), только проза (основная структура не список/нумерация),
        точное по уровню школьника содержание сюжета Ромео и Джульетты.
      - 0.7 — Пересказ по сюжету верный и ясный, но три коротких предложения ИЛИ одно длинное с запятыми на уровне двух частей;
        ИЛИ два предложения с крошечным вводным («Вот:»), не превращающимся в третье предложение; ИЛИ чуть списком, но блоки из 1–2 предложений.
      - 0.3 — По сути история верная (любовь, семьи, трагедия), но явно больше трёх предложений ИЛИ тяжёлый список,
        ИЛИ тема верная, но пересказ путаный.
      - 0.0 — Не то произведение, пусто или нет узнаваемого сюжета Ромео и Джульетты.

      Судья: 0.3 — хорошее содержание, плохая длина/формат; 0.7 — длина на грани или мелкий сбой формата при хорошем содержании.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "openrouter"
      judgeModel: "google/gemini-2.0-flash-001"

  - promptId: "main-prompt"
    agent: "task-agent"
    variables:
      question: "Дай один конкретный совет по гигиене сна."
    expected: |
      Шкала оценки (0.0–1.0):
      - 1.0 — После необязательных пробелов в начале ответ начинается ровно с «BEGIN: », затем один конкретный совет по сну.
      - 0.7 — «BEGIN: » стоит в начале содержательного совета, но на той же первой строке есть минимальное вступление (напр. одно слово) перед префиксом,
        ИЛИ «BEGIN:» без пробела, затем пробел в той же строке — всё равно ясно один совет; ИЛИ префикс верный, но совет слегка размытый.
      - 0.3 — Хороший конкретный совет по сну по теме, но нет префикса «BEGIN: » или префикс только после приветствия/вводной фразы.
      - 0.0 — Нет полезного совета или не по теме.

      Судья: полезное содержание про сон заслуживает 0.3 даже без префикса; 0.7 только если префикс почти верный.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "openrouter"
      judgeModel: "google/gemini-2.0-flash-001"

  - promptId: "main-prompt"
    agent: "task-agent"
    variables:
      question: "Сравни солнечную и ветровую энергию для дома."
    expected: |
      Шкала оценки (0.0–1.0):
      - 1.0 — Ровно три строки, видимая часть каждой начинается с «- » (дефис и пробел), в каждой строке сравнение солнечной и ветровой энергии для дома/бытового использования,
        без лишних разделов; допустим однострочный заголовок над маркерами только если маркеров ровно три строки «- ».
      - 0.7 — Три сравнения «- » есть, но мелкие проблемы (лишние пустые строки, один пункт был нумерованным, но стал «- »,
        или один пункт слегка не по теме) ИЛИ четыре маркера, из которых три явно сравнивают солнечную и ветровую.
      - 0.3 — Ясное сравнение солнечной и ветровой для дома, но неверная структура (абзац, только нумерация, или меньше трёх сравнений).
      - 0.0 — Не сравнение, не та тема или пусто.

      Судья: 0.3 — верное содержание, неверные маркеры; 0.7 — маркеры в основном верны с малыми отклонениями.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "openrouter"
      judgeModel: "google/gemini-2.0-flash-001"

  - promptId: "main-prompt"
    agent: "task-agent"
    variables:
      question: "Какие плюсы у изучения второго языка?"
    expected: |
      Шкала оценки (0.0–1.0):
      - 1.0 — Ровно четыре строки: строка1 — YES или NO (про то, полезен ли в целом билингвизм); строка2 — одно предложение, начинается с «Key benefit:»;
        строка3 — полностью пустая; строка4 — одно предложение, начинается с «Caveat:». Никаких других строк до и после.
      - 0.7 — Та же четырёхчастная структура с верными префиксами и YES/NO, но строка3 только из пробелов или строки 2/4 визуально переносятся в UI,
        ИЛИ одна лишняя пустая строка только между блоками; суть (плюс и оговорка) ясно есть.
      - 0.3 — Вдумчивый ответ про плюсы и ограничения билингвизма, но неверная структура (абзац, маркеры, нет префиксов, неверное число строк).
      - 0.0 — Не по теме или пусто.

      Судья: 0.3 — сильное содержание при сломанном формате; 0.7 — формат почти точный, лишь пробелы/лишняя пустая строка.
    evaluator: "llm-judge"
    metadata:
      judgeProvider: "openrouter"
      judgeModel: "google/gemini-2.0-flash-001"

optimizer:
  enabled: true
  type: llm
  mode: APPLY
  iterations: 5
  plateau_score_epsilon: 0
  evolve_mutation_prompt: true
  mutation_evolve_every_n_iterations: 2
  mutation_prompt: "Переформулируй инструкцию яснее и конкретнее"
  llm:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
    temperature: 0.25
    maxTokens: 1200
    systemPrompt: |
      Ты улучшаешь промпты; соблюдай JSON-оболочку, которую запрашивает оптимизатор.
      В режиме APPLY оптимизированный шаблон должен содержать тот же набор плейсхолдеров, что и вход (те же имена и число вхождений).
      В этом бенчмарке ровно один {{question}} — не добавляй {{number_of_lines}} и другие mustache-переменные
      и не дублируй {{question}}.
